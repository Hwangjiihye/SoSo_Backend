name: Backend Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Create optional GCS key
        run: |
          if [ -n '${{ secrets.GCS_KEY }}' ]; then
            mkdir -p src/main/resources/secure
            cat << 'EOF' > src/main/resources/secure/gcs_key.json
          ${{ secrets.GCS_KEY }}
          EOF
          fi

      - name: Build Spring Boot JAR
        run: mvn clean package -DskipTests

      - name: Rename JAR
        run: |
          JAR_FILE=$(ls target/*.jar | grep -v original | grep -v plain | head -n 1)
          cp "$JAR_FILE" soso-backend.jar

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCE_SSH_KEY }}" > ~/.ssh/gce_key
          chmod 600 ~/.ssh/gce_key
          ssh-keyscan -p ${{ secrets.GCE_PORT }} ${{ secrets.GCE_HOST }} >> ~/.ssh/known_hosts

      - name: Upload JAR to GCE
        run: |
          scp -P ${{ secrets.GCE_PORT }} -i ~/.ssh/gce_key soso-backend.jar \
          ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }}:/home/${{ secrets.GCE_USER }}/app/soso-backend.jar

      - name: Restart Spring Boot service
        run: |
          ssh -p ${{ secrets.GCE_PORT }} -i ~/.ssh/gce_key \
          ${{ secrets.GCE_USER }}@${{ secrets.GCE_HOST }} \
          "sudo systemctl restart soso-backend && sleep 5 && systemctl is-active --quiet soso-backend && echo 'Backend deploy success'"